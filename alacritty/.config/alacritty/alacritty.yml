window:
  padding:
    x: 5
    y: 5
  class:
    instance: Alacritty
    general: Alacritty

scrolling:
  history: 10000

font:
  size: 9.0
    #size: 16.0
  normal:
    #family: Hack Nerd Font Mono
    #family: Source Code Pro
    family: Hack Nerd Font Mono
    style: Medium
  bold:
    family: Hack Nerd Font Mono
    style: Bold
  italic:
    family: Hack Nerd Font Mono
    style: Italic
    
draw_bold_text_with_bright_colors: true
  
# NORD THEME: https://github.com/arcticicestudio/nord-alacritty/blob/develop/src/nord.yml
colors:
  primary:
    background: '#2e3440'
    foreground: '#d8dee9'
    dim_foreground: '#a5abb6'
  cursor:
    text: '#2e3440'
    cursor: '#d8dee9'
  vi_mode_cursor:
    text: '#2e3440'
    cursor: '#d8dee9'
  selection:
    text: CellForeground
    background: '#4c566a'
  search:
    matches:
      foreground: CellBackground
      background: '#88c0d0'
    bar:
      background: '#434c5e'
      foreground: '#d8dee9'
  normal:
    black: '#3b4252'
    red: '#bf616a'
    red: '#ff6363'
    green: '#a3be8c'
    green: '#c6ff63'
    yellow: '#ebcb8b'
    blue: '#6391bf'
    magenta: '#b48ead'
    cyan: '#7fd4d2'
    white: '#e5e9f0'
  bright:
    black: '#4c566a'
    red: '#bf616a'
    red: '#ff6363'
    green: '#a3be8c'
    green: '#c6ff63'
    yellow: '#ebcb8b'
    blue: '#81a1c1'
    blue: '#4d98e3'
    magenta: '#b48ead'
    cyan: '#73d9d6'
    white: '#eceff4'
  dim:
    black: '#373e4d'
    red: '#94545d'
    green: '#809575'
    yellow: '#b29e75'
    blue: '#68809a'
    magenta: '#8c738c'
    cyan: '#6d96a5'
    white: '#aeb3bb'
 
