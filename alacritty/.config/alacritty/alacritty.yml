window:
  padding:
    x: 5
    y: 5
  class:
    instance: Alacritty
    general: Alacritty

scrolling:
  history: 10000

font:
  # The normal (roman) font face to use.
  normal:
    family: hack 
    # Style can be specified to pick a specific face.
    style: Regular
    size: 8.0

  # The bold font face
  bold:
    family: JetBrains Mono Nerd Font
    # Style can be specified to pick a specific face.
    style: Bold

  # The italic font face
  italic:
    family: JetBrains Mono Nerd Font
    # Style can be specified to pick a specific face.
    style: Italic

    #font:
    #  normal:
    #    family: JetBrains Mono Nerd Font
    #    style:  Medium
    #  bold:
    #    family: JetBrains Mono Nerd Font
    #style:  Bold
    #italic:
    #family: JetBrains Mono Nerd Font
    #style:  MediumItalic
    #bold_italic:
    #family: JetBrains Mono Nerd Font
    #style: BoldItalic
    size: 8.0


draw_bold_text_with_bright_colors: true

colors:
  primary:
    background: "#11121D"
    foreground: "#a9b1d6"
  normal:
    black: "#32344a"
    red: "#f7768e"
    green: "#9ece6a"
    yellow: "#e0af68"
    blue: "#7aa2f7"
    magenta: "#ad8ee6"
    cyan: "#449dab"
    white: "#787c99"
  bright:
    black: "#444b6a"
    red: "#ff7a93"
    green: "#b9f27c"
    yellow: "#ff9e64"
    blue: "#7da6ff"
    magenta: "#bb9af7"
    cyan: "#0db9d7"
    white: "#acb0d0"

background_opacity: 1

cursor:
  style:
    shape: block

selection:
  save_to_clipboard: false

live_config_reload: true

shell:
  program: /usr/bin/zsh

key_bindings:
  - { key: Return, mods: Super|Shift, action: SpawnNewInstance }
    #funka pikk dårlig:
    #- { key: Return, mods: Control|Shift, command: { program: "/bin/bash", args: ["-c", opencurrdir] }}
